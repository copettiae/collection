{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="listMedia">
    {{ range .Pages }}
      {{ $flag := index $.Site.Data.country .LinkTitle }}
      <a class="mediaItem" href="{{ .RelPermalink }}">
        <span class="countryFlag">{{ $flag }}</span>
        <span>{{ .LinkTitle }} ({{ len .Pages }})</span>
      </a>
    {{ end }}
  </div>
{{ end }}

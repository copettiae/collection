{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="listMedia">
    {{ range .Pages }}
      {{ $img := index $.Site.Data.genre .LinkTitle }}
      <a class="mediaItem" href="{{ .RelPermalink }}">
        {{ with $img }}<img src="{{ relURL (printf "img/%s" .) }}" alt="">{{ end }}
        <span>{{ .LinkTitle }} ({{ len .Pages }})</span>
      </a>
    {{ end }}
  </div>
{{ end }}
